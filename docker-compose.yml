networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET}

services:
  nginx:
    build:
      context: ./nginx
    volumes:
      - ${NGINX_HOST_LOG_PATH}:/var/log/nginx
      - ${NGINX_SITES_PATH}:/etc/nginx/sites-available
      - ${NGINX_SSL_PATH}:/etc/nginx/ssl
      - ${NGINX_DEFAULT_CONFIG_PATH}:/etc/nginx/nginx.conf
    ports:
      - "${NGINX_HOST_HTTP_PORT}:80"
      - "${NGINX_HOST_HTTPS_PORT}:443"
      - "${VARNISH_BACKEND_PORT}:81"
    depends_on:
      - websocket
    networks:
      - default
    tty: true
  websocket:
    image: node:lts-alpine
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    working_dir: /app
    environment:
      - TZ=Asia/Taipei
    volumes:
      - ${APP_PATH}:/app
    ports:
      - "${WEBSOCKET_PORT}:3000"
    command:
      - npm
      - run
      - start:${WEBSOCKET_ENV}
    networks:
      default:
        ipv4_address: ${WEBSOCKET_NETWORK_IP}
    tty: true
